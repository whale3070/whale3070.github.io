
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    body, html { margin: 0; padding: 0; background: #000; overflow: hidden; font-family: "Microsoft YaHei", "Heiti SC", sans-serif; }
    #ui-layer { position: absolute; z-index: 10; top: 30px; left: 30px; color: rgba(255,255,255,0.8); pointer-events: none; }
    #search-input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 8px 15px; border-radius: 20px; outline: none; width: 220px; font-size: 13px; backdrop-filter: blur(5px); pointer-events: auto; }
    #info-card { position: absolute; z-index: 11; bottom: 30px; right: 30px; width: 280px; background: rgba(10,10,10,0.85); border-left: 3px solid #00ffcc; padding: 20px; color: #fff; backdrop-filter: blur(10px); transform: translateY(125%); transition: transform 0.3s ease; pointer-events: none; }
    .force-graph-container .graph-tooltip { display: none !important; }
  </style>
</head>
<body>
  <div id="ui-layer">
    <h1 style="margin: 0; font-size: 20px; letter-spacing: 3px; font-weight: 300;">思想星系 THOUGHT GALAXY</h1>
    <div style="font-size: 11px; margin-top: 5px; color: #00ffcc;">系统就绪：点位同步完成</div>
    <div style="margin-top: 25px;"><input type="text" id="search-input" placeholder="输入关键字定位..."></div>
  </div>

  <div id="info-card">
    <div id="card-cluster" style="font-size: 10px; color: #00ffcc; margin-bottom: 8px;">SECTOR: UNKNOWN</div>
    <div id="card-title" style="font-size: 16px; font-weight: bold;">---</div>
    <div id="card-year" style="font-size: 11px; opacity: 0.5; margin-top: 10px;">TIMESTAMP: ---</div>
  </div>

  <div id="galaxy-canvas"></div>

  <script src="/thought-map/js/force-graph.min.js"></script>
  <script>
    const container = document.getElementById('galaxy-canvas');
    let hoveredNode = null;

    function colorByYear(year) {
      const t = Math.max(0, Math.min(1, (year - 2014) / (2026 - 2014)));
      return `hsl(${200 - 45 * t}, 85%, ${55 + 15 * t}%)`;
    }

    fetch('/thought-map/thought_map.json')
      .then(res => res.json())
      .then(data => {
        const nodes = data.points.map(p => {
          const d = Math.sqrt(p.x*p.x + p.y*p.y) || 1;
          const f = Math.pow(d, 1.9) * 16;
          return { ...p, x: p.x * f, y: p.y * f };
        });

        const Graph = ForceGraph()(container)
          .graphData({ nodes, links: [] })
          .nodeId('title')
          .backgroundColor('#000000')
          .cooldownTicks(0)
          .onNodeHover(node => {
            hoveredNode = node;
            if (node) {
              document.getElementById('card-title').innerText = node.title;
              document.getElementById('card-cluster').innerText = `SECTOR: ${node.cluster_name}`;
              document.getElementById('card-year').innerText = `TIMESTAMP: ${node.year}`;
              document.getElementById('info-card').style.transform = 'translateY(0)';
            } else {
              document.getElementById('info-card').style.transform = 'translateY(125%)';
            }
          })
          .nodeCanvasObject((node, ctx, globalScale) => {
            const isH = node === hoveredNode;
            const r = (isH ? 6 : 2.5) / Math.pow(globalScale, 0.4);
            const c = colorByYear(node.year);
            ctx.globalCompositeOperation = 'screen';
            ctx.fillStyle = c;
            ctx.beginPath(); ctx.arc(node.x, node.y, r * 5, 0, 2*Math.PI); ctx.fill();
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = isH ? '#fff' : c;
            ctx.beginPath(); ctx.arc(node.x, node.y, r * 0.8, 0, 2*Math.PI); ctx.fill();
            if (globalScale > 22 || isH) {
              ctx.font = `${isH?'bold':'300'} ${10/globalScale}px sans-serif`;
              ctx.fillStyle = 'rgba(255,255,255,0.8)';
              ctx.textAlign = 'center';
              ctx.fillText(node.title, node.x, node.y + r + 5/globalScale);
            }
          })
          .onNodeClick(n => n.url && window.open(n.url, '_blank'));

        document.getElementById('search-input').addEventListener('input', e => {
          const n = nodes.find(i => i.title.toLowerCase().includes(e.target.value.toLowerCase()));
          if (n) { Graph.centerAt(n.x, n.y, 800); Graph.zoom(28, 800); }
        });

        setTimeout(() => Graph.zoomToFit(800, 100), 500);
      });
  </script>
</body>
</html>
