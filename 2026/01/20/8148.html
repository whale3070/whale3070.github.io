<script>
  (function() {
    const currentTitle = "在黑客松遇到的人"; 
    fetch('/recommendations.json')
      .then(res => res.json())
      .then(data => {
        const recos = data[currentTitle];
        if (recos && (recos.similar.length > 0 || recos.divergent.length > 0)) {
          document.getElementById('custom-recommendations').style.display = 'block';
          
          const renderList = (id, list, hoverColor) => {
            const el = document.getElementById(id);
            list.forEach(item => {
              const li = document.createElement('li');
              li.style.marginBottom = '12px';
              li.innerHTML = `<a href="${item.url}" style="color: var(--text-color); text-decoration: none; border-bottom: 1px solid transparent; transition: all 0.2s;">
                 · ${item.title}
              </a>`;
              const a = li.querySelector('a');
              a.onmouseover = () => { a.style.color = hoverColor; a.style.borderBottom = `1px solid ${hoverColor}`; };
              a.onmouseout = () => { a.style.color = 'var(--text-color)'; a.style.borderBottom = '1px solid transparent'; };
              el.appendChild(li);
            });
          };

          renderList('reco-similar', recos.similar, '#00ffcc');
          renderList('reco-divergent', recos.divergent, '#ff9900');
        }
      })
      .catch(err => {
        console.log('Recommendation system skipped or file not found.');
      });
  })();
</script>
